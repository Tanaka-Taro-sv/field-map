<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f5f3a">
  <title>圃場マップ</title>
  <!-- Leaflet本体はCDNから読み込みます。 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div id="map" aria-label="圃場地図"></div>
    <p id="status" class="status" role="status">Excelファイルを読み込んでいます…</p>
    <label class="file-button" for="excel-input">Excelを選択</label>
    <input id="excel-input" type="file" accept=".xlsx,.xls" hidden>
    <button id="locate-button" class="locate-button" type="button" aria-label="現在地を表示">現在地</button>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Excelファイルをブラウザで読み込むためのライブラリです。 -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
